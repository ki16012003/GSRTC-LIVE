<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Bus — GSRTC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 20px; margin-bottom: 4px; color: #1a1a1a; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 20px; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #result {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    #result.success { display: block; background: #e6f4ea; color: #1e7e34; }
    #result.error { display: block; background: #fce8e6; color: #c5221f; }
    #list { margin-top: 16px; display: none; }
    #list.visible { display: block; }
    #list h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
    .bus-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 13px;
    }
    .bus-item button {
      width: auto; padding: 3px 10px; font-size: 12px; background: #c5221f;
    }
    .bus-item button:hover { background: #a41e1c; }
    .bus-count { font-size: 12px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GSRTC Fleet Manager</h1>
    <p class="sub">Add or remove buses from the live fleet map</p>

    <div class="input-group">
      <label for="vehicleNo">Bus Number</label>
      <input type="text" id="vehicleNo" placeholder="e.g. GJ18Z6224" />
    </div>

    <button id="addBtn" onclick="addBus()">Add Bus</button>
    <div id="result"></div>

    <div id="list">
      <h3>Fleet</h3>
      <div id="fleetList"></div>
      <div class="bus-count" id="busCount"></div>
    </div>

    <p style="margin-top:20px;font-size:12px;color:#999;text-align:center">
      <a href="/fleet.html" style="color:#1a73e8">View Fleet Map</a>
    </p>
  </div>

  <script src="/add.js"></script>
</body>
</html>
