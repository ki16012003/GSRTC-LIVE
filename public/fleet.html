<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSRTC Live Fleet Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #status {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 13px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }
    .bus-label {
      color: #fff;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 12px;
      white-space: nowrap;
    }
    .bus-label.running { background: #1a9e4d; }
    .bus-label.idle { background: #e08a00; }
    .bus-label.nosignal { background: #8a8a8a; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/fleet.js"></script>
</body>
</html>
