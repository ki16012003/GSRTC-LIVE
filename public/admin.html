<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSRTC Fleet Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      padding: 24px;
      color: #1a1a1a;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 15px; margin-bottom: 12px; color: #333; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .input-row input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.12); }
    .input-row button {
      padding: 10px 20px; background: #1a73e8; color: white;
      border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .input-row button:hover { background: #1558b0; }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; display: none; }
    #result.success { display: block; background: #e6f4ea; color: #1e7e34; }
    #result.error { display: block; background: #fce8e6; color: #c5221f; }
    .bus-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px;
    }
    .bus-item:last-child { border-bottom: none; }
    .bus-item button {
      padding: 4px 12px; font-size: 12px; background: #c5221f; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    .bus-item button:hover { background: #a41e1c; }
    .bus-count { font-size: 13px; color: #888; margin-top: 8px; }
    .nav-links { text-align: center; margin-top: 20px; font-size: 13px; }
    .nav-links a { color: #1a73e8; text-decoration: none; margin: 0 10px; }
    .nav-links a:hover { text-decoration: underline; }
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge.ok { background: #e6f4ea; color: #1e7e34; }
    .status-badge.err { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>
  <div class="container">
    <h1>GSRTC Fleet Admin</h1>
    <p class="sub">Manage buses on the live fleet map</p>

    <div class="card">
      <h2>Add Bus</h2>
      <div class="input-row">
        <input type="text" id="vehicleNo" placeholder="GJ18Z6224" />
        <button id="addBtn" onclick="addBus()">Add</button>
      </div>
      <div id="result"></div>
    </div>

    <div class="card" id="fleetCard">
      <h2>Fleet</h2>
      <div id="fleetList"></div>
      <div class="bus-count" id="busCount"></div>
    </div>

    <div class="nav-links">
      <a href="/fleet.html">Fleet Map</a>
      <a href="/">Bhuj-Mundra Map</a>
    </div>
  </div>
  <script src="/admin.js"></script>
</body>
</html>
